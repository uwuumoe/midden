{% extends "base.html" %}
{% block title %}Edit Paste | {{ settings.branding.instance_name }}{% endblock %}
{% block content %}
  <h2>Edit paste</h2>
  <form method="post" action="/p/{{ page.paste.public_id }}/edit" x-data="{ content: '', maxBytes: {{ settings.limits.max_paste_bytes }}, byteSize() { return new Blob([this.content]).size } }" x-init="content = $refs.content.value">
    <p><label>Title<br><input name="title" maxlength="120" value="{{ page.paste.title or "" }}"></label></p>
    <p><label>Syntax<br><input name="syntax" value="{{ page.paste.syntax or "" }}" placeholder="rust, text, js"></label></p>
    <p><label>Text<br><textarea name="content" required rows="18" x-ref="content" x-model="content">{{ page.paste.content }}</textarea></label></p>
    <p class="field-note"><span x-text="byteSize()">0</span> / {{ settings.limits.max_paste_bytes }} bytes</p>
    <p><button type="submit">Save paste</button></p>
  </form>
{% endblock %}
