{% extends "base.html" %}
{% block title %}Users | {{ settings.branding.instance_name }}{% endblock %}
{% block content %}
  <h2>Users</h2>

  <h3>Create user</h3>
  <form method="post" action="/admin/users" hx-post="/admin/users" hx-target="#admin-users-lists" hx-swap="outerHTML">
    <p><label>Email<br><input type="email" name="email" required></label></p>
    <p><label>Username<br><input name="username" required></label></p>
    <p><label>Password<br><input type="password" name="password" required></label></p>
    <p><label>Role<br>
      <select name="role">
        <option value="user">user</option>
        <option value="moderator">moderator</option>
        <option value="admin">admin</option>
        <option value="owner">owner</option>
      </select>
    </label></p>
    <p><button type="submit">Create user</button></p>
  </form>

  <h3>Create invite</h3>
  <form method="post" action="/admin/users/invites" hx-post="/admin/users/invites" hx-target="#admin-users-lists" hx-swap="outerHTML">
    <p><label>Role<br>
      <select name="role">
        <option value="user">user</option>
        <option value="moderator">moderator</option>
        <option value="admin">admin</option>
      </select>
    </label></p>
    <p><label>Expires after hours, blank for no expiry<br><input type="number" min="1" name="expires_hours"></label></p>
    <p><button type="submit">Create invite</button></p>
  </form>

  {% include "admin_users_lists.html" %}
{% endblock %}
